<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="btn btn-link" style="position:absolute;top:20px;right:20px;" onclick="handleLogout()">Logout</button>
    <div class="admin-container">
        <div class="admin-panel">
        <h1><img src="assets/icon-lock.png" alt="Admin" style="width:32px;height:32px;vertical-align:middle;margin-right:8px;"> Administrator</h1>
        <!-- top nav for switching views -->
        <div class="admin-nav">
            <button id="navUsers" class="nav-tab active">Users</button>
            <button id="navFeedback" class="nav-tab">Feedback</button>
        </div>
        <p>Below is a list of registered users. You may edit their details or delete accounts.</p>
        <div id="usersSection">
        <table id="userTable">
            <thead>
                <tr>
                    <th><img src="assets/icon-user.png" alt="User" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;"> Name</th><th><img src="assets/icon-email.png" alt="Email" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;"> Email</th><th><img src="assets/icon-key.png" alt="Password" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;"> Password</th>
                </tr>
            </thead>
            <tbody>
                <!-- rows inserted by JS -->
            </tbody>
        </table>
        <div class="admin-actions">
            <button id="editUserBtn" class="btn btn-secondary" disabled>Edit Selected</button>
            <button id="deleteUserBtn" class="btn btn-danger" disabled>Delete Selected</button>
        </div>
        </div> <!-- end usersSection -->

        <!-- Feedback messages section -->
        <div id="feedbackSection" style="display:none;">
        <h2 style="margin-top:40px;"><img src="assets/icon-bell.png" alt="Feedback" style="width:24px;height:24px;vertical-align:middle;margin-right:8px;"> User Feedback</h2>
        <table id="messageTable">
            <thead>
                <tr>
                    <th>Name</th><th>Email</th><th>Phone</th><th>Message</th><th>Date</th>
                </tr>
            </thead>
            <tbody>
                <!-- messages inserted by JS -->
            </tbody>
        </table>
        <div class="admin-actions" style="margin-top:10px;">
            <button id="clearMessagesBtn" class="btn btn-danger" disabled>Clear All Messages</button>
        </div>
        </div> <!-- end feedbackSection -->
        </div> <!-- end admin-panel -->

        <!-- hidden edit modal -->
        <div id="editUserModal" class="modal" style="display:none;">
            <div class="modal-content">
                <h2>Edit User</h2>
                <form id="editUserForm">
                    <div class="form-group">
                        <label for="editName">Name:</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email:</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="editPassword">Password:</label>
                        <input type="text" id="editPassword" required>
                    </div>
                    <div class="modal-buttons">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
